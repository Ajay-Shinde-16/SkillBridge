# ─── Server ───
server.port=${PORT:8081}

# ─── MySQL Database ───
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/skillbridge?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Ajay@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ───
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── JWT ───
jwt.secret=${JWT_SECRET:SkillBridgeSecretKey2024VeryLongSecretKeyForJWTTokenGeneration}
jwt.expiration=86400000

# ─── Admin Registration Secret ───
# Required to create an ADMIN account. Must be set as an env var — if left blank,
# admin self-registration is disabled entirely (fails closed, not open).
admin.registration.secret=${ADMIN_REGISTRATION_SECRET:}

# ─── Brevo API (HTTP, transactional email) ───
brevo.api.key=${BREVO_API_KEY:}
brevo.sender.email=${BREVO_SENDER_EMAIL:noreply@yourdomain.com}
brevo.sender.name=${BREVO_SENDER_NAME:SkillBridge}

# ─── File Upload ───
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
file.upload-dir=./uploads/resumes

# ─── Jackson ───
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ─── App ───
spring.application.name=skillbridge
app.base-url=${FRONTEND_URL:http://localhost:5173}
app.frontend-url=${FRONTEND_URL:http://localhost:5173}