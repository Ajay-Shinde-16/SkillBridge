# ─── Server ───
server.port=8081

# ─── MySQL Database ───
spring.datasource.url=jdbc:mysql://localhost:3306/skillbridge?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ───
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── JWT ───
jwt.secret=SkillBridgeSecretKey2024VeryLongSecretKeyForJWTTokenGeneration
jwt.expiration=86400000

# ─── Gmail SMTP Email ───
# STEP 1: Create Gmail account → skillbridge.cdac2024@gmail.com
# STEP 2: Enable 2-Step Verification at myaccount.google.com
# STEP 3: Generate App Password at myaccount.google.com/apppasswords
# STEP 4: Paste your Gmail and 16-digit App Password below (no spaces)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_GMAIL@gmail.com
spring.mail.password=YOUR_16_DIGIT_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8

# ─── File Upload (Resume PDF) ───
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
file.upload-dir=./uploads/resumes

# ─── Jackson Datetime Format (fixes schedule interview datetime parsing) ───
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ─── App ───
spring.application.name=skillbridge
app.base-url=http://localhost:5173
