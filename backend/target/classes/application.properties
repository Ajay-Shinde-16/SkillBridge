# ─── Server ───
server.port=${PORT:8081}

# ─── MySQL Database ───
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/skillbridge?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Ajay@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ───
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── JWT ───
jwt.secret=${JWT_SECRET:SkillBridgeSecretKey2024VeryLongSecretKeyForJWTTokenGeneration}
jwt.expiration=86400000

# ─── Gmail SMTP (your original Gmail App Password) ───
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:skillbridge.cdac2024@gmail.com}
spring.mail.password=${MAIL_PASSWORD:lqxmmhbegtgdwsmp}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8

# ─── File Upload ───
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
file.upload-dir=./uploads/resumes

# ─── Jackson ───
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ─── App ───
spring.application.name=skillbridge
app.base-url=${FRONTEND_URL:http://localhost:5173}
app.frontend-url=${FRONTEND_URL:http://localhost:5173}